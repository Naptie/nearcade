name: Rankings Update
run-name: Update rankings data

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  workflow_call:
    secrets:
      SSC_SECRET:
        required: true

defaults:
  run:
    shell: bash

jobs:
  update-rankings:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Trigger region rankings update
        env:
          SSC_SECRET: ${{ secrets.SSC_SECRET }}
        run: |
          curl -X POST "https://nearca.de/api/admin/data-updates" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${SSC_SECRET}" \
            -d '{"task":"region_rankings"}'

      - name: Trigger campus rankings update
        env:
          SSC_SECRET: ${{ secrets.SSC_SECRET }}
        run: |
          curl -X POST "https://nearca.de/api/admin/data-updates" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${SSC_SECRET}" \
            -d '{"task":"campus_rankings"}'
