name: University Stats Update
run-name: Update university statistics

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  workflow_call:
    secrets:
      SSC_SECRET:
        required: true

defaults:
  run:
    shell: bash

jobs:
  update-university-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger university stats update
        env:
          SSC_SECRET: ${{ secrets.SSC_SECRET }}
        run: |
          curl -X POST "https://nearca.de/api/admin/data-updates" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${SSC_SECRET}" \
            -d '{"task":"university_stats"}'
          echo "University stats update triggered"
