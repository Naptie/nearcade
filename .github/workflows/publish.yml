name: Publish
run-name: Publish app
on:
  push:
    branches:
      - main
    paths:
      - 'messages/**'
      - 'patches/**'
      - 'plugins/**'
      - 'project.inlang/**'
      - 'scripts/**'
      - 'src/**'
      - 'static/**'
      - 'leanengine.yaml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'svelte.config.js'
      - 'vite.config.ts'
      - '.github/workflows/publish.yml'
  workflow_dispatch:
  workflow_call:

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build app
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event_name == 'workflow_call'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Create build
        run: pnpm build
        env:
          ADAPTER: node
          PUBLIC_AMAP_KEY: ${{ vars.PUBLIC_AMAP_KEY }}
          PUBLIC_BASEMAP_TILE_URLS_PRIMARY: ${{ vars.PUBLIC_BASEMAP_TILE_URLS_PRIMARY }}
          PUBLIC_BASEMAP_TILE_URLS_SECONDARY: ${{ vars.PUBLIC_BASEMAP_TILE_URLS_SECONDARY }}
          PUBLIC_BASEMAP_TILE_URLS_CN: ${{ vars.PUBLIC_BASEMAP_TILE_URLS_CN }}
          PUBLIC_BASEMAP_TILE_URLS_OVERSEAS: ${{ vars.PUBLIC_BASEMAP_TILE_URLS_OVERSEAS }}
          PUBLIC_BASEMAP_TILE_URLS_OVERSEAS_FALLBACK: ${{ vars.PUBLIC_BASEMAP_TILE_URLS_OVERSEAS_FALLBACK }}
          PUBLIC_TENCENT_MAPS_KEY: ${{ vars.PUBLIC_TENCENT_MAPS_KEY }}
          PUBLIC_GOOGLE_MAPS_MAP_ID: ${{ vars.PUBLIC_GOOGLE_MAPS_MAP_ID }}
          PUBLIC_GOOGLE_MAPS_API_KEY: ${{ vars.PUBLIC_GOOGLE_MAPS_API_KEY }}
          PUBLIC_CLARITY_PROJECT_ID: ${{ vars.PUBLIC_CLARITY_PROJECT_ID }}
          PUBLIC_FIREBASE_API_KEY: ${{ vars.PUBLIC_FIREBASE_API_KEY }}
          PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.PUBLIC_FIREBASE_PROJECT_ID }}
          PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ vars.PUBLIC_FIREBASE_AUTH_DOMAIN }}
          PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ vars.PUBLIC_FIREBASE_STORAGE_BUCKET }}
          PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          PUBLIC_FIREBASE_APP_ID: ${{ vars.PUBLIC_FIREBASE_APP_ID }}
          PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ vars.PUBLIC_FIREBASE_MEASUREMENT_ID }}
          PUBLIC_FIREBASE_VAPID_KEY: ${{ vars.PUBLIC_FIREBASE_VAPID_KEY }}
          PUBLIC_BAIDU_SITE_VERIFICATION: ${{ vars.PUBLIC_BAIDU_SITE_VERIFICATION }}
          PUBLIC_FIREBASEINSTALLATIONS_PROXY: ${{ vars.PUBLIC_FIREBASEINSTALLATIONS_PROXY }}
          PUBLIC_FCMREGISTRATIONS_PROXY: ${{ vars.PUBLIC_FCMREGISTRATIONS_PROXY }}
          PUBLIC_FIREBASE_PROXY: ${{ vars.PUBLIC_FIREBASE_PROXY }}
          PUBLIC_GA_TRANSPORT_URL: ${{ vars.PUBLIC_GA_TRANSPORT_URL }}
          FCM_PROXY_HOST: ${{ vars.FCM_PROXY_HOST }}
          GLOAUTH2_PROXY_HOST: ${{ vars.GLOAUTH2_PROXY_HOST }}
          GSAK_BASE64: ${{ secrets.GSAK_BASE64 }}
          SSC_SECRET: ${{ secrets.SSC_SECRET }}
          AMAP_SECRET: ${{ secrets.AMAP_SECRET }}
          WECHAT_TEMPLATE_BIND_RESULT: ${{ secrets.WECHAT_TEMPLATE_BIND_RESULT }}
          WECHAT_TEMPLATE_QUEUE_NOTIFICATION: ${{ secrets.WECHAT_TEMPLATE_QUEUE_NOTIFICATION }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: |
            build/
            data/
            patches/
            scripts/
            package.json
          retention-days: 1

  webhook-publish:
    name: Publish via webhook
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Call deployment webhook
        env:
          WEBHOOK_TOKEN: ${{ secrets.WEBHOOK_SECRET }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          RUN_ID: ${{ github.run_id }}
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -H "X-Webhook-Token: ${WEBHOOK_TOKEN}" \
          -d "{\"run_id\":\"${RUN_ID}\"}" \
          "${WEBHOOK_URL}"
